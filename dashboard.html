<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — INC Report</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-name">INC Report</div>
    <div class="sidebar-brand-sub">Incident Management System</div>
  </div>
  <div class="sidebar-section-label">เมนูหลัก</div>
  <nav class="sidebar-nav">
    <a href="index.html"      class="nav-link"><i class="ti ti-star"></i> แจ้งอุบัติเหตุใหม่</a>
    <a href="employee.html"   class="nav-link"><i class="ti ti-users"></i> สถานะพนักงาน</a>
    <a href="supervisor.html" class="nav-link"><i class="ti ti-mail"></i> หัวหน้ากะ</a>
    <a href="dashboard.html"  class="nav-link active"><i class="ti ti-chart-bar"></i> Dashboard</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar">จป</div>
    <div><div class="user-name">รป. คุณลัทธณ์</div><div class="user-role">Safety Officer</div></div>
  </div>
  <div class="sidebar-logout"><i class="ti ti-logout"></i> ออกจากระบบ</div>
</div>
<div class="topbar">
  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInc" placeholder="ค้นหาตามชื่อเหตุการณ์หรือรหัสเคส...">
  </div>
  <div class="topbar-right">
    <div class="topbar-icon"><i class="ti ti-bell"></i><div class="notif-badge">1</div></div>
    <div class="topbar-icon"><i class="ti ti-help-circle"></i></div>
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px">จป</div>
      <div><div class="topbar-user-name">Admin User</div><div class="topbar-user-role">Safety Manager</div></div>
    </div>
  </div>
</div>
<div class="main-content">
  <div class="page-header-row" style="margin-bottom:20px">
    <div>
      <div class="page-title">Dashboard สรุปผล</div>
      <div class="page-sub">ภาพรวมอุบัติเหตุและสถานะมาตรการ</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <select id="selMonth" style="font-size:14px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--gray-bd);background:var(--bg);color:var(--text)">
        <option value="all">ทุกเดือน</option>
      </select>
    </div>
  </div>
  <div id="summary"></div>
  <div class="chips" id="chips"></div>
  <div id="cards"><div class="loading">กำลังโหลด...</div></div>
</div>
<script src="src/lib/config.js"></script>
<script src="src/pages/dashboard.js"></script>
</body>
</html>
