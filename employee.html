<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สถานะพนักงาน — INC Report</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-name">INC Report</div>
    <div class="sidebar-brand-sub">Incident Management System</div>
  </div>
  <div class="sidebar-section-label">เมนูหลัก</div>
  <nav class="sidebar-nav">
    <a href="index.html"      class="nav-link"><i class="ti ti-star"></i> แจ้งอุบัติเหตุใหม่</a>
    <a href="employee.html"   class="nav-link active"><i class="ti ti-users"></i> สถานะพนักงาน</a>
    <a href="supervisor.html" class="nav-link"><i class="ti ti-mail"></i> หัวหน้ากะ</a>
    <a href="dashboard.html"  class="nav-link"><i class="ti ti-chart-bar"></i> Dashboard</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar">จป</div>
    <div><div class="user-name">รป. คุณลัทธณ์</div><div class="user-role">Safety Officer</div></div>
  </div>
  <div class="sidebar-logout"><i class="ti ti-logout"></i> ออกจากระบบ</div>
</div>
<div class="topbar">
  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" placeholder="ค้นหา...">
  </div>
  <div class="topbar-right">
    <div class="topbar-icon"><i class="ti ti-bell"></i><div class="notif-badge">1</div></div>
    <div class="topbar-icon"><i class="ti ti-help-circle"></i></div>
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px">จป</div>
      <div><div class="topbar-user-name">Admin User</div><div class="topbar-user-role">Safety Manager</div></div>
    </div>
  </div>
</div>
<div class="main-content">
  <div class="page-header-row" style="margin-bottom:20px">
    <div>
      <div class="page-title">สถานะพนักงาน / คู่ธุรกิจ</div>
      <div class="page-sub">ข้อมูลจาก Google Form ที่พนักงานกรอก</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <select id="selMonth" style="font-size:14px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--gray-bd);background:var(--bg);color:var(--text);min-width:180px">
        <option value="all">ทุกเดือน</option>
      </select>
      <select id="selInc" style="font-size:14px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--gray-bd);background:var(--bg);color:var(--text);min-width:280px">
        <option value="all">ทุกเคส</option>
      </select>
    </div>
  </div>

  <!-- Search + กรองแผนก -->
  <div class="card" style="margin-bottom:16px;padding:14px 20px">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="ti ti-search" style="font-size:18px;color:var(--text2);flex-shrink:0"></i>
      <input type="text" id="searchBox"
        placeholder="ค้นหาชื่อพนักงาน, แผนก, สถานะ..."
        style="flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--text)">
      <div style="width:1px;height:24px;background:var(--gray-bd)"></div>
      <i class="ti ti-building" style="font-size:16px;color:var(--text2);flex-shrink:0"></i>
      <select id="selDept" style="font-size:13px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--gray-bd);background:var(--bg);color:var(--text);min-width:160px">
        <option value="">ทุกแผนก</option>
      </select>
    </div>
  </div>

  <div id="content"><div class="loading">กำลังโหลด...</div></div>
</div>
<script src="src/lib/config.js"></script>
<script src="src/pages/employee.js"></script>
</body>
</html>
